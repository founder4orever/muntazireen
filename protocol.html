<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protocol — Muntazireen</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Courier+Prime:wght@400;700&display=swap">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080707;
      --surface: #0e0d0b;
      --border: #1f1e1b;
      --text: #e8dfc8;
      --dim: #6b6558;
      --gold: #b8963c;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-mono: 'Courier Prime', 'Courier New', monospace;
    }
    html, body { background: #08080707; color: var(--text); font-family: var(--font-mono); min-height: 100vh; }
    body { padding-top: 60px; }

    .proto-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 32px 120px;
    }

    .proto-eyebrow {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .proto-title {
      font-family: var(--font-serif);
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 300;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .proto-sub {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--dim);
      margin-bottom: 64px;
    }

    .proto-pillars {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .proto-pillar {
      display: block;
      text-decoration: none;
      padding: 28px 32px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .proto-pillar::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--gold);
      transform: scaleY(0);
      transition: transform 0.3s;
    }

    .proto-pillar:hover {
      border-color: #2e2c28;
      background: #111009;
    }

    .proto-pillar:hover::before {
      transform: scaleY(1);
    }

    .proto-pillar-num {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gold);
      margin-bottom: 8px;
      opacity: 0.7;
    }

    .proto-pillar-name {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 300;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .proto-pillar-desc {
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--dim);
      text-transform: uppercase;
    }

    .proto-pillar-arrow {
      position: absolute;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      opacity: 0;
      transition: opacity 0.3s, right 0.3s;
    }

    .proto-pillar:hover .proto-pillar-arrow {
      opacity: 1;
      right: 24px;
    }
  </style>
</head>
<body>

<div class="proto-wrap">
  <div class="proto-eyebrow">Muntazireen Protocol</div>
  <h1 class="proto-title">The Protocol</h1>
  <p class="proto-sub">Your 35-day preparation framework. Select a pillar.</p>

  <div class="proto-pillars">
    <a href="tracker.html?tab=mind" class="proto-pillar">
      <div class="proto-pillar-num">01</div>
      <div class="proto-pillar-name">Mind</div>
      <div class="proto-pillar-desc">Deen — Prayer, memorisation, spiritual foundation</div>
      <div class="proto-pillar-arrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </a>

    <a href="tracker.html?tab=body" class="proto-pillar">
      <div class="proto-pillar-num">02</div>
      <div class="proto-pillar-name">Body</div>
      <div class="proto-pillar-desc">Physical conditioning — strength, endurance, weaponry</div>
      <div class="proto-pillar-arrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </a>

    <a href="tracker.html?tab=survival" class="proto-pillar">
      <div class="proto-pillar-num">03</div>
      <div class="proto-pillar-name">Survival</div>
      <div class="proto-pillar-desc">Gear, first aid, emergency preparedness</div>
      <div class="proto-pillar-arrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </a>
  </div>
</div>

<script src="nav.js"></script>
</body>
</html>
