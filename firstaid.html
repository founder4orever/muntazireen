async function initSB() {
  if (window._sbInstance) {
    _sb = window._sbInstance;
  } else {
    _sb = window.supabase.createClient(SB_URL, SB_KEY);
    window._sbInstance = _sb;
    window._mtSb = _sb;
  }
  const { data: { session } } = await _sb.auth.getSession();
  if (session && session.user) {
    currentUser = session.user;
    await loadProgress();
    document.getElementById('auth-wall').style.display = 'none';
    document.getElementById('course-wrap').style.display = 'block';
    renderIndex();
  } else {
    document.getElementById('auth-wall').style.display = 'flex';
    document.getElementById('course-wrap').style.display = 'none';
  }
  _sb.auth.onAuthStateChange(async (event, session) => {
    if (session && session.user) {
      currentUser = session.user;
      await loadProgress();
      document.getElementById('auth-wall').style.display = 'none';
      document.getElementById('course-wrap').style.display = 'block';
      renderIndex();
    } else {
      document.getElementById('auth-wall').style.display = 'flex';
      document.getElementById('course-wrap').style.display = 'none';
    }
  });
}

async function loadProgress() {
  const { data } = await _sb.from('protocol_progress').select('first_aid_progress').eq('user_id', currentUser.id).single();
  faProgress = (data && data.first_aid_progress) ? data.first_aid_progress : {};
}

async function saveProgress() {
  await _sb.from('protocol_progress').update({ first_aid_progress: faProgress }).eq('user_id', currentUser.id);
}

// ═══════════════════════════════════════════
// PROGRESS HELPERS
// ═══════════════════════════════════════════
function isCompleted(sessionId) { return faProgress[sessionId]?.completed === true; }
function isLocked(sessionId) {
  // First session always available
  const idx = SESSIONS.findIndex(s => s.id === sessionId);
  if (idx === 0) return false;
  // Locked if previous session not completed
  return !isCompleted(SESSIONS[idx - 1].id);
}
function isInLockout(sessionId) {
  const lockoutUntil = faProgress[sessionId]?.lockout_until;
  if (!lockoutUntil) return false;
  return new Date(lockoutUntil) > new Date();
}
function lockoutRemaining(sessionId) {
  const lockoutUntil = faProgress[sessionId]?.lockout_until;
  if (!lockoutUntil) return '';
  const diff = new Date(lockoutUntil) - new Date();
  if (diff <= 0) return '';
  const hrs = Math.floor(diff / 3600000);
  const mins = Math.ceil((diff % 3600000) / 60000);
  return hrs > 0 ? `${hrs}h ${mins}m remaining` : `${mins}m remaining`;
}
function completedCount() { return SESSIONS.filter(s => isCompleted(s.id)).length; }

// ═══════════════════════════════════════════
// RENDER INDEX
// ═══════════════════════════════════════════
function renderIndex() {
  document.getElementById('course-index').style.display = 'block';
  document.getElementById('session-view').style.display = 'none';
  document.getElementById('session-view').className = 'session-content';

  const done = completedCount();
  const pct = Math.round((done / SESSIONS.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${SESSIONS.length} sessions complete`;

  const list = document.getElementById('session-list');
  list.innerHTML = SESSIONS.map((s, i) => {
    const completed = isCompleted(s.id);
    const locked = isLocked(s.id);
    const lockout = isInLockout(s.id);
    let cls = 'session-row';
    if (locked) cls += ' locked';
    else if (completed) cls += ' completed';
    let statusTxt = '', statusCls = '';
    if (completed) { statusTxt = '✓ Complete'; statusCls = 'done'; }
    else if (locked) { statusTxt = 'Locked'; statusCls = 'locked'; }
    else if (lockout) { statusTxt = lockoutRemaining(s.id); statusCls = 'lockout'; }
    else { statusTxt = 'Available'; statusCls = 'available'; }
    const clickable = !locked && !lockout;
    return `<div class="${cls}" ${clickable ? `onclick="openSession('${s.id}')"` : ''}>
      <div class="session-num">0${i+1}</div>
      <div class="session-info">
        <div class="session-name">${s.title}</div>
        <div class="session-week">${s.week}</div>
      </div>
      <div class="session-status ${statusCls}">${statusTxt}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// RENDER SESSION
// ═══════════════════════════════════════════
function openSession(id) {
  const s = SESSIONS.find(x => x.id === id);
  if (!s) return;
  document.getElementById('course-index').style.display = 'none';
  const view = document.getElementById('session-view');
  view.style.display = 'block';
  view.className = 'session-content active';

  const completed = isCompleted(id);
  const lockout = isInLockout(id);

  const contentHtml = s.content.map(c => {
    let cls = 'content-card';
    if (c.type === 'warning') cls += ' warning-card';
    if (c.type === 'drill') cls += ' drill-card';
    return `<div class="${cls}"><h3>${c.heading}</h3>${c.body}</div>`;
  }).join('');

  const quizHtml = s.quiz.map((q, qi) => {
    const label = String.fromCharCode(65 + qi);
    if (q.type === 'tf') {
      return `<div class="question-block" id="qblock-${id}-${qi}">
        <div class="q-num">Question ${qi+1} of ${s.quiz.length} — True / False</div>
        <div class="q-text">${q.q}</div>
        <div class="tf-options">
          <button class="tf-btn" onclick="selectTF('${id}',${qi},true)" id="tf-${id}-${qi}-true">True</button>
          <button class="tf-btn" onclick="selectTF('${id}',${qi},false)" id="tf-${id}-${qi}-false">False</button>
        </div>
      </div>`;
    } else {
      const optHtml = q.options.map((opt, oi) => {
        return `<div class="option" onclick="selectMCQ('${id}',${qi},${oi})" id="opt-${id}-${qi}-${oi}">
          <div class="option-marker">${String.fromCharCode(65+oi)}</div>
          <div class="option-text">${opt}</div>
        </div>`;
      }).join('');
      return `<div class="question-block" id="qblock-${id}-${qi}">
        <div class="q-num">Question ${qi+1} of ${s.quiz.length} — Multiple Choice</div>
        <div class="q-text">${q.q}</div>
        <div class="options">${optHtml}</div>
      </div>`;
    }
  }).join('');

  view.innerHTML = `
    <button class="back-btn" onclick="renderIndex()">← Back to Course</button>
    <div class="s-header">
      <div class="s-week-tag">${s.week} · Session ${SESSIONS.indexOf(s)+1} of ${SESSIONS.length}</div>
      <h2 class="s-title">${s.title}</h2>
      <p class="s-desc">${s.desc}</p>
    </div>
    <div class="content-section">
      <div class="content-section-head">Study Material</div>
      ${contentHtml}
    </div>
    <div class="quiz-section">
      <div class="quiz-head">Assessment</div>
      <p class="quiz-intro">Answer all questions. You need <span>80% or higher</span> to pass and unlock the next session. Failure triggers a <span>24-hour lockout</span>.</p>
      ${lockout ? `<div class="lockout-banner" style="display:block;">⚠ You are in a 24-hour lockout period. ${lockoutRemaining(id)}. Study the material and return.</div>` : ''}
      ${completed ? `<div class="complete-banner" style="display:block;">✓ You have passed this session. Review the material above at any time.</div>` : ''}
      <div id="quiz-questions-${id}">${quizHtml}</div>
      ${!completed && !lockout ? `
        <div class="quiz-submit">
          <button class="btn-gold" onclick="submitQuiz('${id}')" id="submit-${id}">Submit Assessment</button>
        </div>
        <div class="quiz-result" id="quiz-result-${id}"></div>
      ` : ''}
    </div>`;

  if (completed) {
    // Show answers in review mode
    s.quiz.forEach((q, qi) => {
      if (q.type === 'tf') {
        const btn = document.getElementById(`tf-${id}-${qi}-${q.answer}`);
        if (btn) { btn.classList.add('correct'); btn.disabled = true; }
        const other = document.getElementById(`tf-${id}-${qi}-${!q.answer}`);
        if (other) other.disabled = true;
      } else {
        const opt = document.getElementById(`opt-${id}-${qi}-${q.answer}`);
        if (opt) opt.classList.add('correct');
      }
    });
  }

  // Track answers
  window._quizAnswers = window._quizAnswers || {};
  window._quizAnswers[id] = {};
}

// ═══════════════════════════════════════════
// QUIZ INTERACTION
// ═══════════════════════════════════════════
function selectMCQ(sessionId, qi, oi) {
  if (isCompleted(sessionId)) return;
  const s = SESSIONS.find(x => x.id === sessionId);
  const numOpts = s.quiz[qi].options.length;
  for (let i = 0; i < numOpts; i++) {
    const el = document.getElementById(`opt-${sessionId}-${qi}-${i}`);
    if (el) el.classList.remove('selected');
  }
  const chosen = document.getElementById(`opt-${sessionId}-${qi}-${oi}`);
  if (chosen) chosen.classList.add('selected');
  if (!window._quizAnswers) window._quizAnswers = {};
  if (!window._quizAnswers[sessionId]) window._quizAnswers[sessionId] = {};
  window._quizAnswers[sessionId][qi] = oi;
}

function selectTF(sessionId, qi, val) {
  if (isCompleted(sessionId)) return;
  const trueBtn = document.getElementById(`tf-${sessionId}-${qi}-true`);
  const falseBtn = document.getElementById(`tf-${sessionId}-${qi}-false`);
  if (trueBtn) trueBtn.classList.remove('selected');
  if (falseBtn) falseBtn.classList.remove('selected');
  const btn = document.getElementById(`tf-${sessionId}-${qi}-${val}`);
  if (btn) btn.classList.add('selected');
  if (!window._quizAnswers) window._quizAnswers = {};
  if (!window._quizAnswers[sessionId]) window._quizAnswers[sessionId] = {};
  window._quizAnswers[sessionId][qi] = val;
}

async function submitQuiz(sessionId) {
  const s = SESSIONS.find(x => x.id === sessionId);
  const answers = (window._quizAnswers || {})[sessionId] || {};
  const total = s.quiz.length;

  // Check all answered
  if (Object.keys(answers).length < total) {
    const result = document.getElementById(`quiz-result-${sessionId}`);
    result.style.display = 'block';
    result.className = 'quiz-result fail';
    result.textContent = `Please answer all ${total} questions before submitting.`;
    return;
  }

  // Score
  let correct = 0;
  s.quiz.forEach((q, qi) => {
    if (answers[qi] === q.answer) correct++;
  });
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 80;

  // Show per-question feedback
  s.quiz.forEach((q, qi) => {
    const userAns = answers[qi];
    if (q.type === 'tf') {
      const correctBtn = document.getElementById(`tf-${sessionId}-${qi}-${q.answer}`);
      const wrongBtn = document.getElementById(`tf-${sessionId}-${qi}-${!q.answer}`);
      if (correctBtn) { correctBtn.classList.remove('selected'); correctBtn.classList.add('correct'); correctBtn.disabled = true; }
      if (wrongBtn) { wrongBtn.disabled = true; if (userAns !== q.answer) wrongBtn.classList.add('wrong'); }
    } else {
      for (let i = 0; i < q.options.length; i++) {
        const el = document.getElementById(`opt-${sessionId}-${qi}-${i}`);
        if (!el) continue;
        el.style.pointerEvents = 'none';
        el.classList.remove('selected');
        if (i === q.answer) el.classList.add('correct');
        else if (i === userAns && userAns !== q.answer) el.classList.add('wrong');
      }
    }
  });

  const submitBtn = document.getElementById(`submit-${sessionId}`);
  if (submitBtn) submitBtn.disabled = true;

  const result = document.getElementById(`quiz-result-${sessionId}`);
  result.style.display = 'block';

  if (passed) {
    result.className = 'quiz-result pass';
    result.textContent = `✓ Passed — ${correct}/${total} correct (${pct}%). Session complete. Return to the course to continue.`;
    if (!faProgress[sessionId]) faProgress[sessionId] = {};
    faProgress[sessionId].completed = true;
    faProgress[sessionId].completed_at = new Date().toISOString();
    delete faProgress[sessionId].lockout_until;
    await saveProgress();
  } else {
    result.className = 'quiz-result fail';
    const lockoutUntil = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();
    result.textContent = `✗ Failed — ${correct}/${total} correct (${pct}%). Required: 80%. 24-hour lockout applied. Review the material and return.`;
    if (!faProgress[sessionId]) faProgress[sessionId] = {};
    faProgress[sessionId].lockout_until = lockoutUntil;
    await saveProgress();
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initSB);
} else {
  initSB();
}
</script>
